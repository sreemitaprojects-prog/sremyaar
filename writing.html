<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVIGATION -->
  <nav class="site-nav" aria-label="Main navigation">
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="work.html">Work</a></li>
      <li><a href="writing.html">Writing</a></li>
      <li><a href="connect.html">Connect</a></li>
    </ul>
  </nav>

  <main class="page-content">
    <div class="writing-page">

      <h1 class="page-title">writing</h1>
      <p class="writing-subtitle">a collection of things written between seventeen and now</p>

      <ol class="writing-index" id="writing-list">
        <li class="writing-index-item writing-loading">
          <span class="writing-num">—</span>
          <span class="writing-title-link">loading...</span>
        </li>
      </ol>

      <p class="writing-substack">
        I also write on <a href="#" target="_blank" rel="noopener noreferrer">Substack</a>.
      </p>

    </div>
  </main>

  <script src="script.js"></script>
  <script>
    (function () {
      const PROJECT_ID = 'rfjpgwo0';
      const DATASET = 'production';
      const QUERY = encodeURIComponent(
        '*[_type == "post"] | order(publishedAt desc) { title, slug, publishedAt, excerpt }'
      );
      const URL = `https://${PROJECT_ID}.api.sanity.io/v2023-05-03/data/query/${DATASET}?query=${QUERY}`;

      const list = document.getElementById('writing-list');

      fetch(URL)
        .then((res) => res.json())
        .then((data) => {
          const posts = data.result;
          list.innerHTML = '';

          if (!posts || posts.length === 0) {
            list.innerHTML = '<li class="writing-index-item"><span class="writing-num">—</span><span class="writing-title-link">nothing here yet — come back soon.</span></li>';
            return;
          }

          posts.forEach((post, i) => {
            const num = String(i + 1).padStart(2, '0');
            const li = document.createElement('li');
            li.className = 'writing-index-item';
            li.innerHTML = `
              <span class="writing-num">${num}</span>
              <a class="writing-title-link" href="post.html?slug=${post.slug.current}">${post.title}</a>
            `;
            list.appendChild(li);
          });
        })
        .catch(() => {
          list.innerHTML = '<li class="writing-index-item"><span class="writing-num">—</span><span class="writing-title-link">could not load posts. try again later.</span></li>';
        });
    })();
  </script>
</body>
</html>
