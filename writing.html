      <h1 class="page-title">Writing</h1>

      <!-- FLIPBOOK
           Desktop: two pages visible side by side, like an open book.
           Mobile: single page view.
           Page content is defined in script.js under the `pages` array. -->
      <section class="flipbook-wrapper" aria-label="Writing flipbook">

        <div class="book-spread" role="document">
          <div class="book-page page-left" aria-live="polite">
            <!-- Content rendered by script.js -->
          </div>
          <div class="book-page page-right" aria-live="polite">
            <!-- Content rendered by script.js -->
          </div>
        </div>

        <nav class="flipbook-nav" aria-label="Flipbook navigation">
          <button class="flipbook-arrow prev" aria-label="Previous page" disabled>&#8592;</button>
          <span class="flipbook-page-count" aria-live="polite">1 / 22</span>
          <button class="flipbook-arrow next" aria-label="Next page">&#8594;</button>
        </nav>

      </section>

      <!-- SUBSTACK NOTE -->
      <p class="substack-line">
        I also write on
        <a href="https://substack.com/@sreemita" target="_blank" rel="noopener noreferrer">Substack</a>.
      </p>

    </div>
  </main>
