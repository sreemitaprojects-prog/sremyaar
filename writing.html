<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing - sremyaar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVIGATION -->
  <nav class="site-nav" aria-label="Main navigation">
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="work.html">Work</a></li>
      <li><a href="writing.html">Writing</a></li>
      <li><a href="connect.html">Connect</a></li>
    </ul>
  </nav>

  <main class="page-content">
    <div class="writing-page">

      <h1 class="page-title">writing</h1>
      <p class="writing-subtitle">written between then and now, but ask and i will never tell.</p>

      <div class="writing-filter" id="writing-filter">
        <button class="writing-filter-btn active" data-cat="">all</button>
      </div>

      <div class="writing-grid" id="writing-grid">
        <div style="grid-column:1/-1;font-family:var(--font-sans);font-size:0.9rem;color:#999;padding:2rem 0;">loading...</div>
      </div>

      <p class="writing-substack">
        I also write on <a href="#" target="_blank" rel="noopener noreferrer">Substack</a>.
      </p>

    </div>
  </main>

  <script src="script.js"></script>
  <script>
    (function () {
      var PROJECT_ID = 'rfjpgwo0';
      var DATASET    = 'production';

      function apiUrl(query) {
        return 'https://' + PROJECT_ID + '.api.sanity.io/v2023-05-03/data/query/' + DATASET + '?query=' + encodeURIComponent(query);
      }

      function sanityImageUrl(ref, w, h) {
        var match = ref.match(/^image-(.+)-(\d+x\d+)-(\w+)$/);
        if (!match) return '';
        var base = 'https://cdn.sanity.io/images/' + PROJECT_ID + '/' + DATASET + '/' + match[1] + '-' + match[2] + '.' + match[3];
        return base + (w ? '?w=' + w + '&h=' + h + '&fit=crop&auto=format' : '');
      }

      var allPosts = [];
      var activeCategory = '';

      var grid   = document.getElementById('writing-grid');
      var filter = document.getElementById('writing-filter');

      function renderGrid(posts) {
        if (!posts || posts.length === 0) {
          grid.innerHTML = '<div style="grid-column:1/-1;font-family:var(--font-sans);font-size:0.9rem;color:#999;padding:2rem 0;">nothing here yet — come back soon.</div>';
          return;
        }
        grid.innerHTML = posts.map(function (post) {
          var slug    = post.slug.current;
          var imgHtml = (post.mainImage && post.mainImage.asset && post.mainImage.asset._ref)
            ? '<img src="' + sanityImageUrl(post.mainImage.asset._ref, 600, 600) + '" alt="' + post.title + '" loading="lazy" />'
            : '';
          var excerpt = post.excerpt ? '<p class="writing-card-excerpt">' + post.excerpt + '</p>' : '';
          var cats    = (post.categories && post.categories.length)
            ? '<div class="writing-card-cats">' + post.categories.map(function (c) { return '<span class="writing-card-cat">' + c.title + '</span>'; }).join('') + '</div>'
            : '';
          return '<a class="writing-card" href="post.html?slug=' + slug + '">'
            + '<div class="writing-card-img">' + imgHtml + '</div>'
            + '<div class="writing-card-body">'
            + '<h2 class="writing-card-title">' + post.title + '</h2>'
            + excerpt
            + cats
            + '</div></a>';
        }).join('');
      }

      function applyFilter(cat) {
        activeCategory = cat;
        filter.querySelectorAll('.writing-filter-btn').forEach(function (btn) {
          btn.classList.toggle('active', btn.dataset.cat === cat);
        });
        var filtered = cat
          ? allPosts.filter(function (p) {
              return p.categories && p.categories.some(function (c) { return c.title === cat; });
            })
          : allPosts;
        renderGrid(filtered);
      }

      filter.addEventListener('click', function (e) {
        var btn = e.target.closest('.writing-filter-btn');
        if (!btn) return;
        applyFilter(btn.dataset.cat);
      });

      var catQuery  = '*[_type == "category"] | order(title asc) { title }';
      var postQuery = '*[_type == "post"] | order(publishedAt desc) { title, slug, publishedAt, excerpt, mainImage{ asset }, categories[]->{ title } }';

      Promise.all([fetch(apiUrl(catQuery)).then(function (r) { return r.json(); }), fetch(apiUrl(postQuery)).then(function (r) { return r.json(); })])
        .then(function (results) {
          var cats  = results[0].result || [];
          var posts = results[1].result || [];

          cats.forEach(function (cat) {
            var btn = document.createElement('button');
            btn.className = 'writing-filter-btn';
            btn.dataset.cat = cat.title;
            btn.textContent = cat.title;
            filter.appendChild(btn);
          });

          allPosts = posts;
          renderGrid(posts);
        })
        .catch(function () {
          grid.innerHTML = '<div style="grid-column:1/-1;font-family:var(--font-sans);font-size:0.9rem;color:#999;padding:2rem 0;">could not load posts. try again later.</div>';
        });
    })();
  </script>
</body>
</html>
